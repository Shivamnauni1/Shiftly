<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Shiftly</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="navbar"></div>
  <div class="form-page">
    <div class="form-card">
      <h2>Welcome back</h2>
      <p class="form-subtitle">Log in to find shifts near you</p>
      <div class="alert" id="alert"></div>
      <div class="form-group"><label>Email</label><input type="email" id="email" placeholder="you@email.com"></div>
      <div class="form-group"><label>Password</label><input type="password" id="password" placeholder="Your password"></div>
      <button class="btn btn-primary btn-full" onclick="login()">Login</button>
      <div class="form-switch">Don't have an account? <a href="/pages/register.html">Sign up free</a></div>
    </div>
  </div>
  <script src="/js/app.js"></script>
  <script>
    document.getElementById('navbar').innerHTML = buildNav();
    async function login() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!email || !password) return showAlert('alert', 'Both fields are required');
      try {
        const data = await apiFetch('/auth/login', {
          method: 'POST',
          body: JSON.stringify({ email, password })
        });
        localStorage.setItem('token', data.token);
        // FIX: save userId so profile page works correctly
        localStorage.setItem('user', JSON.stringify({
          name: data.name,
          role: data.role,
          id: data.userId
        }));
        window.location.href = data.role === 'student'
          ? '/pages/student-dashboard.html'
          : '/pages/business-dashboard.html';
      } catch (err) { showAlert('alert', err.message); }
    }
  </script>
</body>
</html>
