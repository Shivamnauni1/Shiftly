<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — Shiftly</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="navbar"></div>
  <div class="form-page">
    <div class="form-card">
      <h2>Create account</h2>
      <p class="form-subtitle">Start earning on your own schedule</p>
      <div class="alert" id="alert"></div>
      <div class="form-group"><label>Full Name</label><input type="text" id="name" placeholder="Your name"></div>
      <div class="form-group"><label>Email</label><input type="email" id="email" placeholder="you@email.com"></div>
      <div class="form-group"><label>Password</label><input type="password" id="password" placeholder="Min 6 characters"></div>
      <div class="form-group">
        <label>I am a</label>
        <select id="role" onchange="toggleFields()">
          <option value="student">Student — looking for shifts</option>
          <option value="business">Business — posting shifts</option>
        </select>
      </div>
      <div id="studentFields">
        <div class="form-group"><label>College / University</label><input type="text" id="college" placeholder="e.g. Graphic Era University"></div>
      </div>
      <div id="bizFields" style="display:none">
        <div class="form-group"><label>Business Name</label><input type="text" id="bizName" placeholder="Your restaurant or shop name"></div>
      </div>
      <button class="btn btn-primary btn-full" onclick="register()">Create Account</button>
      <div class="form-switch">Already have an account? <a href="/pages/login.html">Login</a></div>
    </div>
  </div>
  <script src="/js/app.js"></script>
  <script>
    document.getElementById('navbar').innerHTML = buildNav();
    function toggleFields() {
      const role = document.getElementById('role').value;
      document.getElementById('studentFields').style.display = role === 'student' ? 'block' : 'none';
      document.getElementById('bizFields').style.display = role === 'business' ? 'block' : 'none';
    }
    async function register() {
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const role = document.getElementById('role').value;
      const college = document.getElementById('college').value.trim();
      const businessName = document.getElementById('bizName').value.trim();
      if (!name || !email || !password) return showAlert('alert', 'All fields are required');
      if (password.length < 6) return showAlert('alert', 'Password must be at least 6 characters');
      try {
        await apiFetch('/auth/register', { method: 'POST', body: JSON.stringify({ name, email, password, role, college, businessName }) });
        showAlert('alert', 'Account created! Redirecting...', 'success');
        setTimeout(() => window.location.href = '/pages/login.html', 1500);
      } catch (err) { showAlert('alert', err.message); }
    }
  </script>
</body>
</html>
