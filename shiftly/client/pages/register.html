<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — Shiftly</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="navbar"></div>

  <div class="form-card">
    <h2>Create Account</h2>
    <div class="alert" id="alert"></div>

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="name" placeholder="Your name">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@email.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Min 6 characters">
    </div>
    <div class="form-group">
      <label>I am a</label>
      <select id="role">
        <option value="student">Student</option>
        <option value="business">Business Owner</option>
      </select>
    </div>
    <div class="form-group" id="bizNameGroup" style="display:none">
      <label>Business Name</label>
      <input type="text" id="bizName" placeholder="Your business name">
    </div>

    <button class="btn-primary" onclick="register()">Create Account</button>
    <div class="switch">Already have an account? <a href="/pages/login.html">Login</a></div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    document.getElementById('navbar').innerHTML = buildNav();

    document.getElementById('role').addEventListener('change', function () {
      document.getElementById('bizNameGroup').style.display =
        this.value === 'business' ? 'block' : 'none';
    });

    async function register() {
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const role = document.getElementById('role').value;
      const businessName = document.getElementById('bizName').value.trim();

      if (!name || !email || !password) return showAlert('alert', 'All fields are required');
      if (password.length < 6) return showAlert('alert', 'Password must be at least 6 characters');

      try {
        await apiFetch('/auth/register', {
          method: 'POST',
          body: JSON.stringify({ name, email, password, role, businessName })
        });
        showAlert('alert', 'Account created! Redirecting...', 'success');
        setTimeout(() => window.location.href = '/pages/login.html', 1500);
      } catch (err) {
        showAlert('alert', err.message);
      }
    }
  </script>
</body>
</html>
